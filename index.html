<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Offsets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div class="header-left">
        <i class="fas fa-cube"></i>
        <h1>Roblox Offsets</h1>
        <span class="badge">Windows · Mac · Android</span>
      </div>
      <div class="header-right">
        <span class="chip visit-counter" title="Live website views">
          <i class="fas fa-eye"></i>
          <span id="visitCount">0</span> views
        </span>
        <span class="chip date-badge">
          <i class="far fa-calendar-alt"></i>
          <span id="updateDate">2026-07-22</span>
        </span>
      </div>
    </div>

    <div class="versions-bar">
      <div class="version-item">
        <span class="version-label"><i class="fab fa-windows"></i> Windows</span>
        <code class="version-value">version-9affbe66b2624d20</code>
      </div>
      <div class="version-item">
        <span class="version-label"><i class="fab fa-apple"></i> Mac</span>
        <code class="version-value">0.731</code>
        <code class="version-value">version-614a8fd6f9294c9b</code>
      </div>
      <div class="version-item">
        <span class="version-label"><i class="fab fa-android"></i> Android</span>
        <code class="version-value">2.730.790</code>
      </div>
    </div>

    <div class="platform-tabs-header">
      <button class="platform-tab active" data-platform="windows">
        <i class="fab fa-windows"></i> Windows
      </button>
      <button class="platform-tab" data-platform="mac">
        <i class="fab fa-apple"></i> Mac
      </button>
      <button class="platform-tab" data-platform="android">
        <i class="fab fa-android"></i> Android
      </button>
    </div>

    <div id="platformContent">
      <div class="sub-tabs-header" id="subTabsHeader"></div>
      <div class="file-tabs-header" id="fileTabsHeader"></div>
      <div class="alert-bar" id="alertBar" style="display:none;">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="alertText"></span>
      </div>
      <div class="file-viewer">
        <div class="file-header">
          <div class="file-info">
            <i class="fas fa-file-code"></i>
            <span id="currentFileName">InternalOffsets.hpp</span>
          </div>
          <div class="file-actions">
            <button id="copyBtn" class="copy-btn" title="Copy file content">
              <i class="fas fa-copy"></i> Copy
            </button>
            <a id="githubLink" class="github-btn" href="https://github.com/urmoit/Roblox-Offsets/blob/main/Windows/InternalOffsets.hpp" target="_blank" title="View on GitHub">
              <i class="fab fa-github"></i> GitHub
            </a>
          </div>
        </div>
        <pre class="code-block"><code id="codeContent">Loading...</code></pre>
      </div>
    </div>

    <div class="footer-note">
      <div class="footer-left">
        <a href="https://github.com/urmoit/Roblox-Offsets" class="chip" target="_blank">
          <i class="fas fa-star"></i> Star
        </a>
        <a href="https://paypal.me/urmoken" class="chip donate-chip" target="_blank">
          <i class="fas fa-heart"></i> Donate
        </a>
        <button class="chip" id="shareBtn">
          <i class="fas fa-share-alt"></i> Share
        </button>
      </div>
      <div class="footer-right">
        <span class="footer-text">
          Built by <a href="https://github.com/urmoit" target="_blank" class="author-link">ChosenTechies</a>
          · for the Roblox Hacking Community
        </span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const GITHUB_BASE = 'https://raw.githubusercontent.com/urmoit/Roblox-Offsets/main';
  const GITHUB_BLOB_BASE = 'https://github.com/urmoit/Roblox-Offsets/blob/main';

  const platformFolders = {
    windows: 'Windows',
    mac: 'Mac',
    android: 'Android'
  };

  const platformGroups = {
    windows: [
      { id: 'internal', label: 'Internal', icon: 'fas fa-microchip', files: [
        { name: 'InternalOffsets.hpp', label: 'InternalOffsets.hpp' }
      ]},
      { id: 'external', label: 'External', icon: 'fas fa-plug', files: [
        { name: 'ExternalOffsets.hpp', label: 'ExternalOffsets.hpp' },
        { name: 'ExternalOffsets.json', label: 'ExternalOffsets.json' }
      ]},
      { id: 'fflags', label: 'FFlags', icon: 'fas fa-flag', files: [
        { name: 'FFlags.hpp', label: 'FFlags.hpp' },
        { name: 'FFlags.json', label: 'FFlags.json' }
      ]}
    ],
    mac: [
      { id: 'offsets', label: 'Offsets', icon: 'fas fa-file-code', files: [
        { name: 'Offsets.hpp', label: 'Offsets.hpp' }
      ]}
    ],
    android: [
      { id: 'offsets', label: 'Offsets', icon: 'fas fa-file-code', files: [
        { name: 'Offsets.hpp', label: 'Offsets.hpp' }
      ]},
      { id: 'fflags', label: 'FFlags', icon: 'fas fa-flag', files: [
        { name: 'FFlags.hpp', label: 'FFlags.hpp' }
      ]},
      { id: 'structs', label: 'Structs', icon: 'fas fa-cubes', files: [
        { name: 'Structs.h', label: 'Structs.h' }
      ]}
    ]
  };

  let currentPlatform = 'windows';
  let currentGroup = 'internal';
  let currentFile = 'InternalOffsets.hpp';
  let currentContent = '';

  function getFileUrl(platform, file) {
    return `${GITHUB_BASE}/${platformFolders[platform]}/${file}`;
  }

  function getBlobUrl(platform, file) {
    return `${GITHUB_BLOB_BASE}/${platformFolders[platform]}/${file}`;
  }

  function renderSubTabs(platform) {
    const header = document.getElementById('subTabsHeader');
    const groups = platformGroups[platform];
    header.innerHTML = '';
    groups.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'sub-tab-btn' + (g.id === currentGroup ? ' active' : '');
      btn.dataset.group = g.id;
      btn.innerHTML = `<i class="${g.icon}"></i> ${g.label}`;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGroup = g.id;
        renderFileTabs(platform);
        const group = platformGroups[platform].find(grp => grp.id === currentGroup);
        loadFile(platform, group.files[0].name);
      });
      header.appendChild(btn);
    });
    renderFileTabs(platform);
  }

  function renderFileTabs(platform) {
    const header = document.getElementById('fileTabsHeader');
    const group = platformGroups[platform].find(grp => grp.id === currentGroup);
    if (!group) { header.innerHTML = ''; return; }
    header.innerHTML = '';
    group.files.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'file-tab-btn' + (f.name === currentFile ? ' active' : '');
      btn.innerHTML = `<i class="fas fa-file-code"></i> ${f.label}`;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.file-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadFile(platform, f.name);
      });
      header.appendChild(btn);
    });
  }

  function updateFileName() {
    document.getElementById('currentFileName').textContent = currentFile;
  }

  function updateGithubLink() {
    const link = document.getElementById('githubLink');
    link.href = getBlobUrl(currentPlatform, currentFile);
  }

  function updateCodeBlock(content) {
    const codeEl = document.getElementById('codeContent');
    codeEl.textContent = content;
    currentContent = content;
    updateAlertBar();
  }

  function updateAlertBar() {
    const bar = document.getElementById('alertBar');
    const text = document.getElementById('alertText');
    if (currentPlatform === 'windows' && currentFile === 'InternalOffsets.hpp') {
      text.textContent = '3 offsets failed to resolve (GetLuaState, GetIdentityStruct, and 1 unknown). Total: 107 | Resolved: 104 | Failed: 3';
      bar.style.display = 'flex';
    } else {
      bar.style.display = 'none';
    }
  }

  async function loadFile(platform, file) {
    currentPlatform = platform;
    currentFile = file;
    updateFileName();
    updateGithubLink();
    updateAlertBar();

    const codeEl = document.getElementById('codeContent');
    codeEl.textContent = 'Loading...';

    try {
      const response = await fetch(getFileUrl(platform, file));
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      updateCodeBlock(text);
    } catch (err) {
      codeEl.textContent = `Error loading file: ${err.message}\n\nMake sure you have internet access and the file exists at:\n${getFileUrl(platform, file)}`;
      currentContent = codeEl.textContent;
    }
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => showCopyFeedback()).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); showCopyFeedback(); } catch(e) {}
    document.body.removeChild(textarea);
  }

  function showCopyFeedback() {
    const btn = document.getElementById('copyBtn');
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = original;
      btn.classList.remove('copied');
    }, 1500);
  }

  document.getElementById('copyBtn').addEventListener('click', () => {
    if (currentContent) copyToClipboard(currentContent);
  });

  document.querySelectorAll('.platform-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.platform-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const platform = btn.dataset.platform;
      currentPlatform = platform;
      const groups = platformGroups[platform];
      currentGroup = groups[0].id;
      renderSubTabs(platform);
      const firstFile = groups[0].files[0];
      loadFile(platform, firstFile.name);
    });
  });

  document.getElementById('shareBtn').addEventListener('click', () => {
    if (navigator.share) {
      navigator.share({ title: 'Roblox Offsets', text: 'Check out these Roblox offsets!', url: window.location.href }).catch(() => {});
    } else {
      navigator.clipboard.writeText(window.location.href).then(() => alert('Link copied!')).catch(() => prompt('Copy this link:', window.location.href));
    }
  });

  document.getElementById('updateDate').textContent = '2026-07-22';

  function initVisitCounter() {
    const LS_KEY = 'roblox_offsets_visit_v1';
    const now = Date.now();
    const day = 24 * 60 * 60 * 1000;
    let unique = 0;
    try {
      const raw = localStorage.getItem(LS_KEY);
      const data = raw ? JSON.parse(raw) : { count: 0, lastVisit: 0 };
      if (now - data.lastVisit > day) {
        data.count += 1;
        data.lastVisit = now;
        unique = data.count;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      } else {
        unique = data.count;
      }
    } catch (e) {
      unique = 1;
    }
    const el = document.getElementById('visitCount');
    if (el) el.textContent = unique.toLocaleString();
  }

  initVisitCounter();
  renderSubTabs('windows');
  loadFile('windows', 'InternalOffsets.hpp');
})();
</script>
</body>
</html>
